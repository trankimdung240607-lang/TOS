<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOS - Hệ thống Quản lý Container Cảng</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .yard-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
    .container-box { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .container-box:hover { transform: scale(1.08); box-shadow: 0 0 20px rgb(16 185 129); }
    .modal { animation: modalPop 0.3s ease; }
    .tab-active { border-bottom: 3px solid #10b981; color: #10b981; font-weight: 600; }
    @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- LOGIN -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-700 to-teal-700">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">
      <div class="text-center mb-10">
        <i class="fa fa-ship text-7xl text-emerald-600 mb-6"></i>
        <h1 class="text-4xl font-bold text-gray-800">TOS Cảng Container</h1>
        <p class="text-emerald-600 mt-2 font-medium">Terminal Operating System v2.4</p>
      </div>
      <input id="username" type="text" value="admin" class="w-full px-6 py-4 border border-gray-300 rounded-2xl mb-4 focus:border-emerald-500 focus:outline-none">
      <input id="password" type="password" value="123456" class="w-full px-6 py-4 border border-gray-300 rounded-2xl mb-6 focus:border-emerald-500 focus:outline-none">
      <button onclick="login()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-semibold text-lg transition">ĐĂNG NHẬP</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="hidden flex min-h-screen">
    <!-- SIDEBAR -->
    <div class="w-72 bg-white border-r border-gray-200 shadow-sm flex flex-col">
      <div class="p-6 border-b border-gray-200 flex items-center gap-4">
        <i class="fa fa-ship text-4xl text-emerald-600"></i>
        <div>
          <h1 class="text-2xl font-bold text-gray-800">TOS Cảng</h1>
          <p class="text-emerald-600 text-sm flex items-center gap-2"><span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Trực tuyến</p>
        </div>
      </div>
      <nav class="flex-1 p-4 overflow-auto" id="sidebarNav"></nav>
      <div class="p-6 border-t border-gray-200">
        <div class="flex items-center gap-3 bg-emerald-50 p-4 rounded-3xl">
          <i class="fa fa-user-circle text-4xl text-emerald-600"></i>
          <div class="flex-1">
            <p id="userName" class="font-semibold text-gray-800">Nguyễn Văn A</p>
            <p id="currentRole" class="text-xs text-emerald-600">Quản trị viên</p>
          </div>
          <button onclick="logout()" class="text-red-500 hover:text-red-600"><i class="fa fa-sign-out-alt"></i></button>
        </div>
      </div>
    </div>

    <!-- CONTENT AREA -->
    <div class="flex-1 flex flex-col">
      <div class="h-16 bg-white border-b border-gray-200 px-8 flex items-center justify-between shadow-sm">
        <h2 id="pageTitle" class="text-3xl font-semibold text-gray-800">Dashboard</h2>
        <div id="realTimeBar" class="text-emerald-600 text-sm flex items-center gap-3 font-medium"></div>
      </div>
      <div class="flex-1 overflow-auto p-8 bg-gray-50" id="contentArea"></div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div id="modalContent" class="bg-white w-full max-w-2xl rounded-3xl p-8 modal shadow-2xl max-h-[92vh] overflow-auto"></div>
  </div>

  <script>
    tailwind.config = { content: ["*"] }

    const menuItems = [
      { id: "dashboard", icon: "fa-tachometer-alt", name: "Dashboard", fr: "FR12" },
      { id: "ship", icon: "fa-ship", name: "Quản lý Tàu & Manifest", fr: "FR03-FR04" },
      { id: "container", icon: "fa-boxes-stacked", name: "Quản lý Container", fr: "FR05" },
      { id: "yard", icon: "fa-map", name: "Bản đồ Bãi Container", fr: "FR06-FR07" },
      { id: "gate", icon: "fa-truck-ramp-box", name: "Cổng Gate In/Out", fr: "FR08" },
      { id: "vehicle", icon: "fa-truck", name: "Phương tiện Vận tải", fr: "FR09" },
      { id: "equipment", icon: "fa-crane", name: "Thiết bị Xếp dỡ", fr: "FR10" },
      { id: "planning", icon: "fa-calendar-check", name: "Phân công & Điều độ", fr: "FR11" },
      { id: "report", icon: "fa-chart-pie", name: "Báo cáo & Thống kê", fr: "FR13" },
      { id: "search", icon: "fa-magnifying-glass", name: "Tra cứu Thông tin", fr: "FR14" },
      { id: "user", icon: "fa-users-gear", name: "Quản lý Người dùng", fr: "FR02" }
    ]

    function renderSidebar() {
      document.getElementById("sidebarNav").innerHTML = menuItems.map(item => `
        <a onclick="switchPage('${item.id}')" class="flex items-center gap-4 px-6 py-4 hover:bg-emerald-50 rounded-2xl cursor-pointer text-gray-700 hover:text-emerald-700 transition">
          <i class="fa ${item.icon} text-xl w-6"></i>
          <span class="font-medium">${item.name}</span>
          <span class="ml-auto text-xs bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full">${item.fr}</span>
        </a>
      `).join('')
    }

    function login() {
      document.getElementById("loginScreen").classList.add("hidden")
      document.getElementById("mainApp").classList.remove("hidden")
      renderSidebar()
      switchPage("dashboard")
      startRealTime()
    }

    function logout() {
      document.getElementById("mainApp").classList.add("hidden")
      document.getElementById("loginScreen").classList.remove("hidden")
    }

    function showModal(title, bodyHTML) {
      document.getElementById("modalContent").innerHTML = `
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-2xl font-semibold text-gray-800">${title}</h3>
          <button onclick="closeModal()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
        </div>
        ${bodyHTML}
      `
      document.getElementById("modal").classList.remove("hidden")
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden")
    }

    function switchPage(page) {
      document.getElementById("pageTitle").textContent = menuItems.find(m => m.id === page).name
      const area = document.getElementById("contentArea")

      if (page === "container") {
        area.innerHTML = `
          <div class="bg-white rounded-3xl shadow p-8">
            <div class="flex justify-between items-center mb-8">
              <h3 class="text-3xl font-semibold text-gray-800">Quản lý Container (FR05)</h3>
              <button onclick="addContainer()" class="px-8 py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl flex items-center gap-3 font-medium">
                <i class="fa fa-plus"></i> Thêm Container Mới
              </button>
            </div>
            <table class="w-full text-sm" id="containerTable">
              <thead><tr class="border-b border-gray-200"><th class="py-5 text-left">Mã Container</th><th>Loại</th><th>Kích thước</th><th>Tình trạng</th><th>Vị trí</th><th>Hành động</th></tr></thead>
              <tbody class="text-gray-700"></tbody>
            </table>
          </div>
        `
        renderContainerTable()
      } 
      else {
        area.innerHTML = `
          <div class="bg-white rounded-3xl shadow p-12 text-center">
            <i class="fa ${menuItems.find(m => m.id === page).icon} text-8xl text-emerald-200 mb-6"></i>
            <h2 class="text-3xl font-semibold text-gray-700">${menuItems.find(m => m.id === page).name}</h2>
            <p class="text-gray-500 mt-4">Nội dung trang đã được thiết kế theo tông màu trắng - xanh lá</p>
          </div>
        `
      }
    }

    function renderContainerTable() {
      const tbody = document.querySelector("#containerTable tbody")
      const data = [
        {code:"ABCD1234567", type:"Dry", size:"20ft", status:"Đầy", location:"A-12-05-03"},
        {code:"EFGH9876543", type:"Reefer", size:"40ft", status:"Lạnh", location:"B-08-02-04"},
        {code:"IJKL4567890", type:"Hazard", size:"20ft", status:"Nguy hiểm", location:"C-15-01-02"}
      ]
      tbody.innerHTML = data.map(item => `
        <tr class="border-b border-gray-100 hover:bg-emerald-50">
          <td class="py-6 font-medium">${item.code}</td>
          <td>${item.type}</td>
          <td>${item.size}</td>
          <td><span class="px-5 py-2 text-xs rounded-2xl ${item.status==='Lạnh'?'bg-cyan-100 text-cyan-700':item.status==='Nguy hiểm'?'bg-red-100 text-red-700':'bg-emerald-100 text-emerald-700'}">${item.status}</span></td>
          <td class="font-medium">${item.location}</td>
          <td><button onclick="viewContainerDetail('${item.code}')" class="text-emerald-600 hover:text-emerald-700 font-medium">Chi tiết →</button></td>
        </tr>
      `).join('')
    }

    function addContainer() {
      showModal("Thêm Container Mới", `
        <form onsubmit="handleAddContainer(event)" class="space-y-6">
          <div class="grid grid-cols-2 gap-6">
            <div><label class="block text-sm font-medium mb-2 text-gray-600">Mã Container</label><input id="contCode" type="text" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-emerald-500" required></div>
            <div><label class="block text-sm font-medium mb-2 text-gray-600">Loại Container</label>
              <select id="contType" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-emerald-500"><option>Dry</option><option>Reefer</option><option>Hazard</option></select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-6">
            <div><label class="block text-sm font-medium mb-2 text-gray-600">Kích thước</label>
              <select id="contSize" class="w-full px-5 py-4 border border-gray-300 rounded-2xl"><option>20ft</option><option>40ft</option></select>
            </div>
            <div><label class="block text-sm font-medium mb-2 text-gray-600">Vị trí</label><input id="contLocation" type="text" class="w-full px-5 py-4 border border-gray-300 rounded-2xl" placeholder="A-12-05-03"></div>
          </div>
          <button type="submit" class="w-full py-5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-semibold text-lg">Lưu Container</button>
        </form>
      `)
    }

    function handleAddContainer(e) {
      e.preventDefault()
      const code = document.getElementById("contCode").value
      alert(`✅ Container ${code} đã được thêm thành công!`)
      closeModal()
    }

    function viewContainerDetail(code) {
      showModal(`Chi tiết Container: ${code}`, `
        <div class="flex gap-8 border-b pb-6">
          <button onclick="switchTab(0)" class="tab-active pb-2" id="tab0">Thông tin</button>
          <button onclick="switchTab(1)" class="pb-2" id="tab1">Lịch sử</button>
        </div>
        <div id="tabContent" class="py-8">
          <p class="text-lg"><strong>Loại:</strong> Dry • <strong>Kích thước:</strong> 40ft</p>
          <p class="mt-6"><strong>Vị trí hiện tại:</strong> Block A - Bay 12 - Row 05 - Tier 03</p>
          <p class="mt-4 text-emerald-600 font-medium">Trạng thái: Đầy hàng</p>
        </div>
      `)
    }

    function switchTab(n) {
      document.querySelectorAll('[id^="tab"]').forEach(t => t.classList.remove('tab-active'))
      document.getElementById(`tab${n}`).classList.add('tab-active')
    }

    function startRealTime() {
      setInterval(() => {
        const bar = document.getElementById("realTimeBar")
        if (bar) bar.innerHTML = `📦 ${Math.floor(Math.random()*300)+200} container đang được xử lý`
      }, 4000)
    }

    window.onload = () => {}
  </script>
</body>
</html>
