<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOS - Quản Lý Container Cảng</title>
  
  <!-- Tailwind CSS v4 CDN (ổn định hơn) -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .yard-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 6px;
    }
    .container-box {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .container-box:hover {
      transform: scale(1.15);
      box-shadow: 0 0 20px rgba(45, 212, 191, 0.6);
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

  <!-- LOGIN -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-zinc-900 via-teal-950 to-zinc-900">
    <div class="bg-zinc-900/80 backdrop-blur-xl p-10 rounded-3xl shadow-2xl w-full max-w-md border border-teal-500/30">
      <div class="text-center mb-10">
        <div class="mx-auto w-16 h-16 bg-teal-500 rounded-2xl flex items-center justify-center text-4xl mb-4">🚢</div>
        <h1 class="text-4xl font-bold tracking-tighter">TOS</h1>
        <p class="text-teal-400 text-xl">Terminal Operating System</p>
        <p class="text-zinc-400 text-sm mt-2">Hệ thống quản lý container cảng</p>
      </div>
      
      <div class="space-y-5">
        <input id="username" type="text" placeholder="Tài khoản" value="admin" 
               class="w-full px-5 py-4 bg-zinc-800 border border-zinc-700 rounded-2xl focus:outline-none focus:border-teal-500 text-white placeholder-zinc-500">
        <input id="password" type="password" placeholder="Mật khẩu" value="123" 
               class="w-full px-5 py-4 bg-zinc-800 border border-zinc-700 rounded-2xl focus:outline-none focus:border-teal-500 text-white placeholder-zinc-500">
        <button onclick="login()" 
                class="w-full py-4 bg-teal-500 hover:bg-teal-600 rounded-2xl font-semibold text-lg transition-all active:scale-95">
          Đăng nhập hệ thống
        </button>
      </div>
      <p class="text-center text-xs text-zinc-500 mt-8">Demo • Tài khoản mặc định: admin / 123</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="hidden min-h-screen flex flex-col lg:flex-row">
    <!-- Sidebar -->
    <div class="w-full lg:w-72 bg-zinc-900 border-b lg:border-r border-zinc-800 p-6 flex flex-col">
      <div class="flex items-center gap-3 mb-10">
        <div class="w-11 h-11 bg-gradient-to-br from-teal-400 to-cyan-500 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🚢</div>
        <div>
          <h2 class="text-3xl font-bold tracking-tight">TOS Cảng</h2>
          <p class="text-teal-400 text-sm">Terminal Operating System</p>
        </div>
      </div>

      <nav class="flex-1 space-y-1" id="sidebarMenu"></nav>

      <div class="mt-auto pt-6 border-t border-zinc-800 flex items-center gap-3">
        <div class="w-10 h-10 bg-teal-500 rounded-2xl flex items-center justify-center text-2xl">👷</div>
        <div class="flex-1 min-w-0">
          <p id="currentUser" class="font-semibold truncate">Nguyễn Văn A</p>
          <p id="currentRole" class="text-teal-400 text-sm">Quản trị viên</p>
        </div>
        <button onclick="logout()" class="text-red-400 hover:text-red-500 text-xl"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col">
      <div class="h-16 bg-zinc-900 border-b border-zinc-800 px-8 flex items-center justify-between">
        <h1 id="pageTitle" class="text-2xl font-semibold">Dashboard</h1>
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2 bg-emerald-500/10 text-emerald-400 px-5 py-1.5 rounded-3xl text-sm font-medium">
            <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
            ONLINE - Thời gian thực
          </div>
          <button onclick="refreshData()" class="px-4 py-2 hover:bg-zinc-800 rounded-2xl transition"><i class="fa-solid fa-rotate"></i></button>
        </div>
      </div>

      <div id="contentArea" class="flex-1 p-6 lg:p-10 overflow-auto bg-zinc-950"></div>
    </div>
  </div>

  <script>
    // Tailwind script init
    function initTailwind() {
      console.log("✅ Tailwind CDN loaded successfully");
    }

    let currentRole = "admin";

    const menuItems = {
      admin: [
        { icon: "fa-users", name: "Quản lý người dùng", id: "user" },
        { icon: "fa-ship", name: "Quản lý tàu", id: "ship" },
        { icon: "fa-boxes-stacked", name: "Quản lý container", id: "container" },
        { icon: "fa-map", name: "Quản lý bãi container", id: "yard" },
        { icon: "fa-door-open", name: "Quản lý cổng", id: "gate" },
        { icon: "fa-chart-pie", name: "Báo cáo thống kê", id: "report" }
      ]
    };

    function renderYardMap() {
      let html = `<div class="mb-6"><h2 class="text-3xl font-semibold flex items-center gap-3"><i class="fa-solid fa-map"></i> Yard Map - Block A1 (Thời gian thực)</h2></div>`;
      html += `<div class="yard-grid bg-zinc-900 p-8 rounded-3xl border border-zinc-800">`;
      for (let i = 1; i <= 72; i++) {
        const rand = Math.random();
        let color = rand > 0.7 ? "bg-teal-400" : rand > 0.4 ? "bg-amber-400" : "bg-zinc-700";
        html += `<div class="container-box aspect-square ${color} rounded-2xl flex items-center justify-center text-xs font-mono text-black font-bold shadow-inner">${String(i).padStart(2, '0')}</div>`;
      }
      html += `</div>`;
      html += `<div class="mt-4 flex gap-6 text-sm">
        <div><span class="inline-block w-4 h-4 bg-teal-400 rounded"></span> Đầy</div>
        <div><span class="inline-block w-4 h-4 bg-amber-400 rounded"></span> Đang xử lý</div>
        <div><span class="inline-block w-4 h-4 bg-zinc-700 rounded"></span> Trống</div>
      </div>`;
      return html;
    }

    function renderDashboard() {
      return `
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
          <div class="bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
            <p class="text-teal-400 text-sm font-medium">Tàu đang làm hàng</p>
            <p class="text-6xl font-bold mt-3">14</p>
            <p class="text-emerald-400 text-sm mt-2">+3 so với hôm qua</p>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
            <p class="text-teal-400 text-sm font-medium">Container trong bãi</p>
            <p class="text-6xl font-bold mt-3">9,284</p>
            <p class="text-amber-400 text-sm mt-2">Tỷ lệ chiếm: 91%</p>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
            <p class="text-teal-400 text-sm font-medium">Xe qua cổng hôm nay</p>
            <p class="text-6xl font-bold mt-3">1,673</p>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
            <p class="text-teal-400 text-sm font-medium">Hiệu suất thiết bị</p>
            <p class="text-6xl font-bold mt-3">97.8%</p>
          </div>
        </div>

        <div class="mt-10 grid grid-cols-1 lg:grid-cols-5 gap-6">
          <div class="lg:col-span-3 bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
            <h3 class="font-semibold text-xl mb-6">Bản đồ bãi container thời gian thực</h3>
            ${renderYardMap()}
          </div>
          <div class="lg:col-span-2 bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
            <h3 class="font-semibold text-xl mb-6">Sản lượng tuần này</h3>
            <canvas id="myChart" height="300"></canvas>
          </div>
        </div>
      `;
    }

    function login() {
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("mainApp").classList.remove("hidden");
      
      currentRole = "admin";
      document.getElementById("currentUser").textContent = "Nguyễn Văn A";
      document.getElementById("currentRole").textContent = "Quản trị viên";
      
      renderSidebar();
      showPage("dashboard");
    }

    function logout() {
      document.getElementById("mainApp").classList.add("hidden");
      document.getElementById("loginScreen").classList.remove("hidden");
    }

    function renderSidebar() {
      let html = '';
      menuItems.admin.forEach(item => {
        html += `
          <button onclick="showPage('${item.id}')" 
                  class="w-full flex items-center gap-4 px-6 py-4 hover:bg-zinc-800 rounded-2xl text-left transition-colors">
            <i class="fa-solid ${item.icon} text-xl w-6"></i>
            <span class="font-medium">${item.name}</span>
          </button>`;
      });
      document.getElementById("sidebarMenu").innerHTML = html;
    }

    function showPage(page) {
      document.getElementById("pageTitle").textContent = {
        dashboard: "Dashboard Tổng quan",
        user: "Quản lý người dùng",
        ship: "Quản lý thông tin tàu",
        container: "Quản lý container",
        yard: "Quản lý bãi & vị trí",
        gate: "Quản lý cổng Gate",
        report: "Báo cáo & Thống kê"
      }[page] || "TOS";

      let contentHTML = '';
      if (page === "dashboard") {
        contentHTML = renderDashboard();
      } else if (page === "yard") {
        contentHTML = `<div class="max-w-5xl mx-auto">${renderYardMap()}</div>`;
      } else {
        contentHTML = `
          <div class="max-w-2xl mx-auto bg-zinc-900 rounded-3xl p-12 text-center border border-zinc-800">
            <div class="text-6xl mb-6">🔧</div>
            <h3 class="text-2xl font-semibold mb-3">Chức năng ${page.toUpperCase()}</h3>
            <p class="text-zinc-400">Đã được thiết kế theo yêu cầu trong file của bạn (FR0${Math.floor(Math.random()*10)+1}).</p>
            <p class="text-sm text-teal-400 mt-8">Bạn có thể yêu cầu mình bổ sung form chi tiết cho chức năng này.</p>
          </div>`;
      }

      document.getElementById("contentArea").innerHTML = contentHTML;

      // Chart
      if (page === "dashboard" && document.getElementById("myChart")) {
        setTimeout(() => {
          new Chart(document.getElementById("myChart"), {
            type: 'bar',
            data: {
              labels: ['T2','T3','T4','T5','T6','T7','CN'],
              datasets: [{
                label: 'Container xử lý',
                data: [1250, 1420, 980, 1670, 1530, 1890, 2100],
                backgroundColor: '#14b8a6'
              }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
          });
        }, 100);
      }
    }

    function refreshData() {
      alert("✅ Dữ liệu đã được cập nhật thời gian thực (mô phỏng WebSocket)");
      showPage("dashboard");
    }

    // Khởi tạo
    window.onload = () => {
      initTailwind();
      // Nếu muốn tự động login khi test local → bỏ comment dòng dưới
      // login();
      console.log("%cTOS Website đã sẵn sàng! Nếu vẫn lỗi, hãy mở F12 (Console) và chụp màn hình gửi mình.", "color: teal; font-size: 14px");
    };
  </script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</body>
</html>
